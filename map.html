<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sacramento Resource Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; }
        #map { height: 100%; width: 100%; }
        
        /* Fix for readability - BIG and CLEAR */
        .leaflet-popup-content {
            font-size: 18px !important;
            line-height: 1.4;
            padding: 10px;
        }
        
        .dir-btn {
            display: block;
            margin-top: 12px;
            padding: 12px;
            background-color: #ff8c00; /* High-contrast Orange */
            color: white !important;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([38.5816, -121.4944], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // DYNAMIC "YOU ARE HERE" FEATURE
    map.locate({setView: false, watch: true, enableHighAccuracy: true});

    let userMarker;
    map.on('locationfound', function(e) {
        if (!userMarker) {
            userMarker = L.circleMarker(e.latlng, {
                radius: 10,
                color: '#fff',
                fillColor: '#007bff',
                fillOpacity: 0.9,
                weight: 3
            }).addTo(map).bindPopup("<b>You are here</b>").openPopup();
        } else {
            userMarker.setLatLng(e.latlng);
        }
    });

    map.on('locationerror', function() {
        console.log("Location access denied.");
    });

    // LOADING YOUR DATA
    fetch('sacramento_food.json')
        .then(response => response.json())
        .then(data => {
            data.forEach(place => {
                const marker = L.marker([place.lat, place.lng]).addTo(map);

                // Open Google Maps in a NEW TAB (target="_blank") to keep your site open
                const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lng}&travelmode=walking`;

                marker.bindPopup(`
                    <div style="min-width: 220px;">
                        <strong style="font-size: 20px;">${place.name}</strong><br>
                        <span style="font-size: 16px; color: #333;">${place.address}</span><br>
                        <span style="font-size: 16px; color: #333;">Hours: ${place.hours}</span><br>
                        <a href="${directionsUrl}" target="_blank" class="dir-btn">
                            Get Directions
                        </a>
                        <p style="font-size: 12px; color: #666; margin-top: 8px; font-weight: normal;">
                            (Opens in new tab to keep map active)
                        </p>
                    </div>
                `);
            });
        });
</script>
</body>
</html>
