<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinics Stack</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  background: #0b0c10;
  font-family: system-ui;
  color: white;
}

/* MAP */
#map {
  height: 40vh;
  width: 100%;
}

/* STACK AREA */
#clinic-list {
  position: relative;
  height: 520px;
  max-width: 420px;
  margin: 20px auto;
  perspective: 1200px;
}

/* CARD */
.clinic-card {
  position: absolute;
  width: 100%;
  border-radius: 18px;
  padding: 18px;
  box-sizing: border-box;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);

  transition: transform 0.6s ease, opacity 0.6s ease;
  cursor: pointer;

  /* IMPORTANT: prevents text stacking blur */
  backface-visibility: hidden;
}

/* STATES */
/* ACTIVE CARD */
.clinic-card.active {
  transform: translateY(0px) scale(1);
  opacity: 1;
  z-index: 10;
}

/* CARD RIGHT BEHIND */
.clinic-card.next {
  transform: translateY(60px) scale(0.95);
  opacity: 0.6;
  z-index: 5;
}

/* DEEP STACK */
.clinic-card.back {
  transform: translateY(120px) scale(0.9);
  opacity: 0.25;
  z-index: 1;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="clinic-list"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ================= MAP ================= */
const map = L.map('map').setView([38.5816, -121.4944], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

/* ================= STATE ================= */
let activeIndex = 0;
let timer = null;

/* ================= RENDER ================= */
function renderClinics(clinics) {
  const list = document.getElementById("clinic-list");

  list.innerHTML = clinics.map((c, i) => `
    <div class="clinic-card">
      <div class="clinic-name">${c.SITE_NM || "Clinic"}</div>
      <div class="clinic-address">
        ${c.SITE_ADDRESS || ""} ${c.SITE_CITY || ""}
      </div>
      <div class="clinic-meta">
        ${c.SITE_PHONE_NUM || ""}
      </div>
    </div>
  `).join("");

  initStack();
}

/* ================= STACK ENGINE ================= */
function initStack() {
  const cards = document.querySelectorAll(".clinic-card");

  function render() {
    cards.forEach((card, i) => {
      card.classList.remove("active", "next", "back");

      if (i === activeIndex) card.classList.add("active");
      else if (i === activeIndex + 1) card.classList.add("next");
      else card.classList.add("back");
    });
  }

  cards.forEach((card, i) => {
    card.onclick = () => {
      activeIndex = i;
      render();
    };
  });

  render();

  clearInterval(timer);
  timer = setInterval(() => {
    activeIndex = (activeIndex + 1) % cards.length;
    render();
  }, 3500);
}

/* ================= DATA LOAD ================= */
async function loadClinics() {
  try {
    const res = await fetch(
      "https://data.hrsa.gov/HDWAPI3_External/api/v1/GetHealthCentersAroundALocation",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          Latitude: 38.5816,
          Longitude: -121.4944,
          Radius: 10,
          MinRecs: 10,
          MaxRadius: 15,
          RadiusIncrement: 5,
          Token: "84b58a24-b399-49b9-af97-01983013897c"
        })
      }
    );

    const data = await res.json();
    const clinics = data.HCC || [];

    renderClinics(clinics);

  } catch (e) {
    document.getElementById("clinic-list").innerHTML =
      "<p style='padding:20px;'>Failed to load clinics</p>";
  }
}

loadClinics();
</script>

</body>
</html>
