<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Finder - One Father's Love</title>

<!-- USWDS Standard Core Stylesheet CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/uswds/3.8.0/css/uswds.min.css" integrity="sha512-Y45PAnKCHoZclgLTo090O7mR0P6S87U+zW3Xn22r9WqVwFpM7gW1mKzZzX1VpW5Yq==' crossorigin="anonymous" />
<!-- Leaflet Map CSS CDN -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
/* Clean integration layer between Map interface and Federal Layout framework */
body {
  margin: 0;
  font-family: Source Sans Pro Web, Helvetica Neue, Helvetica, Roboto, Arial, sans-serif;
  background-color: #f0f4f8;
}

#map-container {
  width: 100%;
  height: 45vh;
  border-bottom: 4px solid #005ea2; /* Federal blue separator line */
}

#map {
  width: 100%;
  height: 100%;
}

.main-content-area {
  max-width: 64rem; /* Standard USWDS container max-width breakpoint */
  margin: 0 auto;
  padding: 2rem 1rem;
}

/* Accessible card active indicator border tracking */
.usa-card.is-active {
  outline: 4px solid #2491ff;
  outline-offset: 2px;
  background-color: #ffffff;
}

.usa-card__body p {
  margin-bottom: 0.5rem;
}
</style>
</head>

<body>

<!-- Spatial Map Interface Section -->
<div id="map-container">
  <div id="map" role="region" aria-label="Resource Coordinates Map"></div>
</div>

<!-- Main Accessible Grid Section -->
<main class="main-content-area" id="main-content">
  <div class="usa-sr-only">Use your keyboard arrows to explore the updated search locations below after selections are made.</div>
  
  <div class="usa-section-heading">
    <h1 class="usa-heading-xl margin-top-0 margin-bottom-3">Nearby Civic Health Resources</h1>
  </div>

  <!-- Standard USWDS Accessible Card Layout Grid System -->
  <ul class="usa-card-group grid-row grid-gap" id="clinic-list-container">
    <!-- Component cards are built natively inside this grid block -->
    <li class="tablet:grid-col-12 margin-bottom-3">
      <div class="usa-card padding-3 text-center">Loading authenticated federal resource feeds...</div>
    </li>
  </ul>
</main>

<!-- Leaflet Library Link -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- USWDS Standard JavaScript Framework Library CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/uswds/3.8.0/js/uswds.min.js" defer></script>

<script>
/* ================= GEOSPATIAL MAP SETUP ================= */
const map = L.map('map', { zoomControl: true }).setView([38.5816, -121.4944], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

/* ================= COMPONENT APP STATE ================= */
let activeIndex = 0;
let mapMarkers = [];

/* ================= REGULATORY 508 DATA RENDER ENGINE ================= */
function renderFederalCards(clinics) {
  const container = document.getElementById("clinic-list-container");

  // Clear previous marker elements from layer stack memory safely
  mapMarkers.forEach(m => { if (m) map.removeLayer(m); });
  mapMarkers = [];

  if (clinics.length === 0) {
    container.innerHTML = `
      <li class="tablet:grid-col-12">
        <div class="usa-alert usa-alert--error">No local providers found inside this service boundary area.</div>
      </li>`;
    return;
  }

  // Loop through and map native structures directly out of the raw response array data
  container.innerHTML = clinics.map((c, i) => {
    if (c.LATITUDE && c.LONGITUDE) {
      const marker = L.marker([c.LATITUDE, c.LONGITUDE])
        .bindPopup(`<b>${c.SITE_NM || "Service Provider"}</b>`)
        .addTo(map);
      mapMarkers.push(marker);
    } else {
      mapMarkers.push(null);
    }

    // Returns structural HTML configured straight from USWDS structural standards templates
    return `
      <li class="tablet:grid-col-6 desktop:grid-col-4 display-flex flex-align-stretch" id="card-item-${i}">
        <div class="usa-card usa-card--grid-col flex-1" style="cursor: pointer;" onclick="focusResourceElement(${i})">
          <div class="usa-card__container">
            <header class="usa-card__header">
              <h2 class="usa-card__heading usa-heading-m">${c.SITE_NM || "Health Resource"}</h2>
            </header>
            <div class="usa-card__body">
              <p class="text-bold text-base-darker">${c.SITE_ADDRESS || ""}, ${c.SITE_CITY || ""}</p>
              <p class="text-neutral-dark font-mono-sm">${c.SITE_PHONE_NUM || "No Phone Registered"}</p>
            </div>
            <div class="usa-card__footer">
              <button class="usa-button usa-button--outline" type="button" aria-label="Center map coordinates on ${c.SITE_NM || 'this provider'}">
                View on Coordinates
              </button>
            </div>
          </div>
        </div>
      </li>
    `;
  }).join("");

  // Initialize focus mechanics on first load loop execution boundary
  focusResourceElement(0);
}

/* ================= SPATIAL SYNCHRONIZATION AND LAYOUT FOCUS ================= */
function focusResourceElement(index) {
  const cards = document.querySelectorAll("#clinic-list-container li .usa-card");
  if (cards.length === 0) return;

  activeIndex = index;

  // Sync highlighting framework visually based on active selection bounds
  cards.forEach((card, idx) => {
    if (idx === activeIndex) {
      card.classList.add("is-active");
      card.setAttribute("aria-selected", "true");
      
      // Smooth dynamic telemetry panning execution layer
      if (mapMarkers[idx]) {
        mapMarkers[idx].openPopup();
        map.panTo(mapMarkers[idx].getLatLng());
      }
    } else {
      card.classList.remove("is-active");
      card.setAttribute("aria-selected", "false");
    }
  });
}

/* ================= SYSTEM DATA PIPELINE INGESTION LAYER ================= */
async function fetchProviderDatabaseFeed() {
  try {
    const response = await fetch(
      "https://data.hrsa.gov/HDWAPI3_External/api/v1/GetHealthCentersAroundALocation",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          Latitude: 38.5816,
          Longitude: -121.4944,
          Radius: 10,
          MinRecs: 10,
          MaxRadius: 15,
          RadiusIncrement: 5,
          Token: "84b58a24-b399-49b9-af97-01983013897c"
        })
      }
    );

    const data = await response.json();
    const records = data.HCC || [];
    renderFederalCards(records);

  } catch (error) {
    document.getElementById("clinic-list-container").innerHTML = `
      <li class="tablet:grid-col-12">
        <div class="usa-alert usa-alert--error usa-alert--slim">
          <div class="usa-alert__body">
            <p class="usa-alert__text">Critical Failure syncing live federal data infrastructure assets.</p>
          </div>
        </div>
      </li>`;
  }
}

// Fire system runtime execution routine loop directly on mount sequence initialization
fetchProviderDatabaseFeed();
</script>

</body>
</html>
