<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Clinics — OneFathersLove Sacramento</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --gold: #c9a84c;
  --crimson: #800000;
  --black: #060606;
  --white: #fff;
  --gray: #888;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
}

/* HEADER */
#header {
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: #0a0a0a;
}

#header a {
  color: var(--gold);
  text-decoration: none;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

#header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
}

/* MAP */
#map {
  height: 45vh;
  width: 100%;
}

/* STATUS */
#status-bar {
  background: var(--crimson);
  padding: 10px 20px;
  font-size: 0.72rem;
  text-align: center;
}

/* NAV SYSTEM (YOUR ROTATION) */
.nav-container {
  height: 120px;
  overflow: hidden;
  position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-list {
  position: absolute;
  width: 100%;
  transition: transform 0.6s ease;
}

.nav-item {
  padding: 14px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: #111;
  cursor: pointer;
}

.nav-item.active {
  background: #222;
  color: var(--gold);
}

/* CLINICS */
#clinic-list {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
}

.clinic-card {
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 20px 0;
}

.clinic-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  margin-bottom: 6px;
}

.clinic-address {
  font-size: 0.78rem;
  color: var(--gray);
}

.clinic-phone a {
  color: var(--gold);
  text-decoration: none;
}

/* BUTTON */
.scroll-btn {
  position: fixed;
  right: 12px;
  top: 40%;
  background: var(--gold);
  color: #000;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
  border: none;
  z-index: 999;
}

</style>
</head>

<body>

<div id="header">
  <a href="index.html">← Home</a>
  <h1>Sacramento Free Clinics</h1>
  <span style="font-size:0.65rem;color:var(--gray);">HRSA Data</span>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- STATUS -->
<div id="status-bar">Federally Qualified Health Centers — Updated Daily by HRSA</div>

<!-- ROTATING NAV (INTEGRATED, NOT REPLACING ANYTHING) -->
<div class="nav-container">
  <div class="nav-list" id="navList">
    <div class="nav-item">Clinics</div>
    <div class="nav-item">Food Banks</div>
    <div class="nav-item">Dental</div>
    <div class="nav-item">Shelter</div>
    <div class="nav-item">Mental Health</div>
  </div>
</div>

<button class="scroll-btn" onclick="manualScroll()">Scroll</button>

<!-- CLINICS -->
<div id="clinic-list">
  <div id="loading">Loading clinics...</div>
</div>

<footer style="text-align:center;padding:30px;color:#555;">
  © 2026 OneFathersLove
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
   MAP
========================= */
const map = L.map('map').setView([38.5816, -121.4944], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

/* =========================
   NAV ROTATION SYSTEM
========================= */

const list = document.getElementById("navList");
const items = document.querySelectorAll(".nav-item");

let index = 0;
let paused = false;
let interval;
const ITEM_HEIGHT = 48;

function update() {
  items.forEach((el, i) => {
    el.classList.toggle("active", i === index);
  });
}

function rotate() {
  if (paused) return;

  index = (index + 1) % items.length;
  list.style.transform = `translateY(-${index * ITEM_HEIGHT}px)`;
  update();
}

function start() {
  interval = setInterval(rotate, 8000);
}

function pause() {
  paused = true;
  clearInterval(interval);
}

function resume() {
  paused = false;
  start();
}

function manualScroll() {
  pause();

  index = (index + 1) % items.length;
  list.style.transform = `translateY(-${index * ITEM_HEIGHT}px)`;
  update();

  setTimeout(resume, 4000);
}

/* tap pause */
items.forEach(item => {
  item.addEventListener("click", () => {
    pause();
    item.classList.toggle("active");
    setTimeout(resume, 5000);
  });
});

/* touch pause */
document.addEventListener("touchstart", pause, { passive: true });
document.addEventListener("touchend", resume, { passive: true });

start();
update();

/* =========================
   CLINIC DATA (HRSA)
========================= */

async function loadClinics() {
  try {
    const response = await fetch(
      'https://data.hrsa.gov/HDWAPI3_External/api/v1/GetHealthCentersAroundALocation',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          Latitude: 38.5816,
          Longitude: -121.4944,
          Radius: 10,
          MinRecs: 10,
          MaxRadius: 15,
          RadiusIncrement: 5,
          Token: '84b58a24-b399-49b9-af97-01983013897c'
        })
      }
    );

    const data = await response.json();
    const clinics = data.HCC || [];

    renderClinics(clinics);
    addMarkers(clinics);

  } catch (e) {
    document.getElementById("loading").innerText = "Failed to load clinics";
  }
}

function renderClinics(clinics) {
  const list = document.getElementById("clinic-list");

  list.innerHTML = clinics.map(c => `
    <div class="clinic-card">
      <div class="clinic-name">${c.SITE_NM}</div>
      <div class="clinic-address">${c.SITE_ADDRESS}</div>
      <div class="clinic-phone">
        <a href="tel:${c.SITE_PHONE_NUM}">${c.SITE_PHONE_NUM}</a>
      </div>
    </div>
  `).join("");
}

function addMarkers(clinics) {
  clinics.forEach(c => {
    if (!c.LAT_LON) return;

    const [lat, lng] = c.LAT_LON.trim().split(" ").map(Number);
    if (!lat || !lng) return;

    L.circleMarker([lat, lng], {
      radius: 6,
      color: "#c9a84c",
      fillColor: "#800000",
      fillOpacity: 0.8
    }).addTo(map)
      .bindPopup(c.SITE_NM);
  });
}

loadClinics();

</script>

</body>
</html>
