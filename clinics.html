<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Nav</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
}

/* NAV WRAPPER */
.nav-container {
  height: 180px;
  overflow: hidden;
  position: relative;
  border-bottom: 1px solid #222;
}

/* LIST MOVES UP */
.nav-list {
  position: absolute;
  width: 100%;
  transition: transform 0.6s ease;
}

/* ITEMS */
.nav-item {
  padding: 18px;
  border-bottom: 1px solid #222;
  background: #151515;
  cursor: pointer;
}

/* TOP ITEM BECOMES "FLIP CARD" */
.nav-item.active {
  background: #222;
  transform: perspective(800px) rotateX(180deg);
}

/* simple back face effect */
.nav-item.active::after {
  content: "DETAIL VIEW";
  display: block;
  margin-top: 10px;
  font-size: 12px;
  color: #aaa;
}

/* FLOAT BUTTON (manual scroll) */
.scroll-btn {
  position: fixed;
  right: 12px;
  top: 40%;
  background: #c9a84c;
  color: #000;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
  z-index: 999;
}
</style>
</head>

<body>

<div class="nav-container" id="container">
  <div class="nav-list" id="list">

    <div class="nav-item">Clinics</div>
    <div class="nav-item">Food Banks</div>
    <div class="nav-item">Dental</div>
    <div class="nav-item">Shelter</div>
    <div class="nav-item">Mental Health</div>

  </div>
</div>

<div class="scroll-btn" onclick="manualScroll()">
  Scroll
</div>

<script>
const list = document.getElementById("list");
const items = document.querySelectorAll(".nav-item");

let index = 0;
let paused = false;
let interval;

// height of one item
const ITEM_HEIGHT = 58;

/* AUTO ROTATE */
function rotate() {
  if (paused) return;

  index++;

  if (index >= items.length) {
    index = 0;
  }

  list.style.transform = `translateY(-${index * ITEM_HEIGHT}px)`;

  highlight();
}

/* TOP ITEM = ACTIVE FLIP */
function highlight() {
  items.forEach((el, i) => {
    el.classList.remove("active");
    if (i === index) {
      el.classList.add("active");
    }
  });
}

/* START LOOP */
function start() {
  interval = setInterval(rotate, 8000); // 8 seconds
}

/* PAUSE SYSTEM */
function pause() {
  paused = true;
  clearInterval(interval);
}

/* RESUME */
function resume() {
  paused = false;
  start();
}

/* MANUAL SCROLL BUTTON */
function manualScroll() {
  pause();

  index++;

  if (index >= items.length) index = 0;

  list.style.transform = `translateY(-${index * ITEM_HEIGHT}px)`;
  highlight();

  setTimeout(resume, 4000);
}

/* TAP ANY ITEM PAUSES */
items.forEach(item => {
  item.addEventListener("click", () => {
    pause();

    // simple toggle "flip view"
    item.classList.toggle("active");

    setTimeout(resume, 5000);
  });
});

/* SCROLL DETECTION (mobile swipe/scroll) */
let lastTouch = 0;

document.addEventListener("touchstart", () => {
  lastTouch = Date.now();
});

document.addEventListener("touchend", () => {
  if (Date.now() - lastTouch < 500) {
    pause();
    setTimeout(resume, 4000);
  }
});

start();
highlight();
</script>

</body>
</html>
