<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinics Stack</title>

<!-- Leaflet CDN -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  background: #0b0c10;
  font-family: system-ui;
  color: white;
}

/* MAP */
#map {
  height: 40vh;
  width: 100%;
}

/* STACK AREA */
#clinic-list {
  position: relative;
  height: 520px;
  max-width: 420px;
  margin: 20px auto;
  perspective: 1200px;
  overflow: hidden; /* Prevent out-of-bounds rendering during transitions */
}

/* CARD BASE */
.clinic-card {
  position: absolute;
  width: 100%;
  border-radius: 18px;
  padding: 18px;
  box-sizing: border-box;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);

  /* Smooth transition animations for transformations and visibility scales */
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease, visibility 0.6s ease;
  cursor: pointer;

  backface-visibility: hidden;
  opacity: 0;
  visibility: hidden;
  transform: translateY(0px) scale(0.85);
  z-index: 0;
}

/* ACTIVE STATE (Top Card) */
.clinic-card.active {
  visibility: visible;
  transform: translateY(0px) scale(1);
  opacity: 1;
  z-index: 10;
}

/* NEXT STATE (Second Card) */
.clinic-card.next {
  visibility: visible;
  transform: translateY(70px) scale(0.95);
  opacity: 0.5;
  z-index: 5;
}

/* BACK STATE (Third Card) */
.clinic-card.back {
  visibility: visible;
  transform: translateY(140px) scale(0.9);
  opacity: 0.2;
  z-index: 1;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="clinic-list"></div>

<!-- Leaflet Library Link -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ================= MAP INITIALIZATION ================= */
const map = L.map('map').setView([38.5816, -121.4944], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

/* ================= APP STATE ================= */
let activeIndex = 0;
let timer = null;
let markers = [];

/* ================= UI RENDER DATA ENGINE ================= */
function renderClinics(clinics) {
  const list = document.getElementById("clinic-list");

  // Wipe previous instances of map layers
  markers.forEach(m => { if (m) map.removeLayer(m); });
  markers = [];

  list.innerHTML = clinics.map((c, i) => {
    // Generate functional map tracking markers if coordinates are active
    if (c.LATITUDE && c.LONGITUDE) {
      const marker = L.marker([c.LATITUDE, c.LONGITUDE])
        .bindPopup(`<b>${c.SITE_NM || "Clinic"}</b>`)
        .addTo(map);
      markers.push(marker);
    } else {
      markers.push(null); // Preserve spatial alignment array indices
    }

    return `
      <div class="clinic-card">
        <div class="clinic-name" style="font-weight:bold; font-size:1.2rem; margin-bottom:8px;">${c.SITE_NM || "Clinic"}</div>
        <div class="clinic-address" style="opacity:0.8; font-size:0.95rem; margin-bottom:6px;">
          ${c.SITE_ADDRESS || ""} ${c.SITE_CITY || ""}
        </div>
        <div class="clinic-meta" style="opacity:0.6; font-size:0.85rem;">
          ${c.SITE_PHONE_NUM || ""}
        </div>
      </div>
    `;
  }).join("");

  initStack();
}

/* ================= SLIDING CARDS STACK ENGINE ================= */
function initStack() {
  const cards = document.querySelectorAll(".clinic-card");
  const total = cards.length;
  if (total === 0) return;

  function render() {
    cards.forEach((card, i) => {
      // FIX: Calculate circular wrapped distance using modulo math to solve boundary breakdown
      const diff = (i - activeIndex + total) % total;

      // Reset style classes cleanly to prevent layout jumps
      card.classList.remove("active", "next", "back");

      if (diff === 0) {
        card.classList.add("active");
        // Center mapping perspective on current selection
        if (markers[i]) {
          markers[i].openPopup();
          map.panTo(markers[i].getLatLng());
        }
      }
      else if (diff === 1) {
        card.classList.add("next");
      }
      else if (diff === 2) {
        card.classList.add("back");
      }
      else {
        // Keeps non-visible cards scaled down out of vision safely behind the stack layer
        // No explicit style overrides here to protect active animation timings
      }
    });
  }

  // Bind individual user click interactions
  cards.forEach((card, i) => {
    card.onclick = () => {
      activeIndex = i;
      render();
      resetTimer();
    };
  });

  // Keep the automatic slider cycle fresh and timed properly
  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
      activeIndex = (activeIndex + 1) % total;
      render();
    }, 3500);
  }

  render();
  resetTimer();
}

/* ================= NATIVE BROWSING DATA INGESTION ================= */
async function loadClinics() {
  try {
    const res = await fetch(
      "https://data.hrsa.gov/HDWAPI3_External/api/v1/GetHealthCentersAroundALocation",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          Latitude: 38.5816,
          Longitude: -121.4944,
          Radius: 10,
          MinRecs: 10,
          MaxRadius: 15,
          RadiusIncrement: 5,
          Token: "84b58a24-b399-49b9-af97-01983013897c"
        })
      }
    );

    const data = await res.json();
    const clinics = data.HCC || [];

    renderClinics(clinics);

  } catch (e) {
    document.getElementById("clinic-list").innerHTML =
      "<p style='padding:20px; color: #ff6b6b;'>Failed to sync data components safely.</p>";
  }
}

// Fire the pipeline engine
loadClinics();
</script>

</body>
</html>
