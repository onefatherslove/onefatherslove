        flex-shrink: 0;  
      }  
      .novi-input {  
        flex: 1;  
        background: rgba(255, 255, 255, 0.6);  
        border: 1px solid #938ACE;  
        border-radius: 20px;  
        padding: 7px 12px;  
        color: #000;  
        font-size: 11px;  
        outline: none;  
        font-family: Verdana, sans-serif;  
      }  
      .novi-input::placeholder {  
        color: #888;  
      }  
      .novi-send-btn {  
        background: #938ACE;  
        border: none;  
        border-radius: 50%;  
        width: 32px;  
        height: 32px;  
        display: flex;  
        align-items: center;  
        justify-content: center;  
        cursor: pointer;  
        font-size: 14px;  
        flex-shrink: 0;  
        transition: background 0.2s;  
      }  
      .novi-send-btn:hover {  
        background: #b8b0e8;  
      }  
      .fetch-status {  
        font-size: 8px;  
        color: rgba(255, 255, 255, 0.3);  
        text-align: center;  
        margin-top: 4px;  
        font-family: Verdana, sans-serif;  
      }  
    </style>  
  </head>  
  <body>  
    <div id="map-container">  
      <div id="map" role="region" aria-label="Resource Coordinates Map"></div>  
    </div>  
    <main class="main-content-area">  
      <div class="phone" id="phone">  
        <div class="phone-top"></div>  
        <div class="phone-btn-r"></div>  
        <div class="phone-btn-l1"></div>  
        <div class="phone-btn-l2"></div>  
        <div class="screen" id="screen">  
          <div class="card-stage" id="stage"></div>  
          <!-- NOVI CHAT PANEL -->  
          <div class="novi-panel" id="noviPanel">  
            <div class="novi-panel-header">  
              <div class="novi-panel-avatar">🦊</div>  
              <div class="novi-panel-title">  
                <div class="novi-panel-name">Novi</div>  
                <div class="novi-panel-sub">One Father's Love · System Guide</div>  
              </div>  
              <button class="novi-close-btn" id="noviCloseBtn">✕ Close</button>  
            </div>  
            <div class="novi-messages" id="noviMessages"></div>  
            <div class="novi-quick-replies" id="quickReplies">  
              <button class="quick-reply" data-msg="I need reassurance">I'm overwhelmed</button>  
              <button class="quick-reply" data-msg="What are my next options?">Next options</button>  
              <button class="quick-reply" data-msg="Help me prepare for my clinic visit">Prepare me</button>  
              <button class="quick-reply" data-msg="I'm in a health crisis right now and don't know what to do">I'm in crisis</button>  
            </div>  
            <div class="novi-input-row">  
              <input class="novi-input" id="noviInput" type="text" placeholder="Ask Novi anything..." />  
              <button class="novi-send-btn" id="noviSendBtn">➔</button>  
            </div>  
          </div>  
          <div class="progress-bar-wrap">  
            <div class="progress-label">Until Next Clinic 🏥</div>  
            <div class="progress-bar-track">  
              <div class="progress-bar-fill" id="progressBar"></div>  
            </div>  
          </div>  
          <div class="controls">  
            <button class="ctrl-btn" id="prevBtn" aria-label="Previous clinic">&#8592; Prev Clinic</button>  
            <div class="dots" id="dots"></div>  
            <button class="ctrl-btn" id="nextBtn" aria-label="Next clinic">Next Clinic &#8594;</button>  
            <button class="pause-btn" id="pauseBtn">&#9646;&#9646; Pause Clinics</button>  
          </div>  
        </div>  
      </div>  
      <div class="fetch-status" id="fetchStatus"></div>  
    </main>  
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>  
    <script>  
      /* ===== MAP ===== */  
      const map = L.map('map', {  
        zoomControl: true  
      }).setView([38.5816, -121.4944], 14);  
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {  
        attribution: '© OpenStreetMap contributors'  
      }).addTo(map);  
      map.locate({  
        setView: false,  
        watch: true,  
        enableHighAccuracy: true  
      });  
      let userMarker;  
      map.on('locationfound', e => {  
        if (!userMarker) userMarker = L.circleMarker(e.latlng, {  
          radius: 8,  
          color: '#fff',  
          fillColor: '#007bff',  
          fillOpacity: 0.9,  
          weight: 3  
        }).addTo(map).bindPopup("<b>You are here</b>").openPopup();  
        else userMarker.setLatLng(e.latlng);  
      });  
      /* ===== DATA ===== */  
      const FALLBACK_DATA = [{  
          name: "WellSpace Health Clinic",  
          lat: 38.5816,  
          lng: -121.4944,  
          address: "1230 K St",  
          gradient: "linear-gradient(to bottom, #a8c8c0 0%, #d4e8e4 50%, #f0f4f2 100%)",  
          desc: "Provides comprehensive primary care family medical services across regional Sacramento community access centers.",  
          eligibility: "Sacramento County Medi-Cal or assigned managed care plans. Uninsured sliding scale available.",  
          specialties: "Primary Care, Serious Specialist Referrals, Internal Medicine, Dental Care.",  
          payment: "Medi-Cal, Medicare, FQHC sliding scale based on verified household income limits.",  
          noviLine: "CRITICAL: If they say they're not accepting new patients — do NOT leave. Ask the front desk to file an Internal Network Assignment Request, or call your Medi-Cal managed care line from the lobby and demand emergency assignment. You have that right."  
        },  
        {  
          name: "One Community Health",  
          lat: 38.5756,  
          lng: -121.4704,  
          address: "1500 21st St",  
          gradient: "linear-gradient(to bottom, #a8c8c0 0%, #d4e8e4 50%, #f0f4f2 100%)",  
          desc: "Specialized comprehensive primary care facility focusing on intensive case management and complex diagnostic referrals.",  
          eligibility: "Open to all Sacramento residents. Requires direct insurance plan transfer updates or sliding scale registration.",  
          specialties: "Primary Care, Specialized Medicine Referrals, Preventive Health, Behavioral Therapy.",  
          payment: "Medi-Cal, Medicare, Commercial Insurance, and sliding fees for low-income brackets.",  
          noviLine: "CRITICAL: If your plan transfer lags at registration, ask the clerk to run a Temporary Retroactive Plan Verification override — or request the onsite Financial Navigator to clear the assignment block. Don't walk away without a next step."  
        }  
      ];  
      /* ===== NOVI SYSTEM PROMPT ===== */  
      const NOVI_SYSTEM = `You are Novi, the compassionate and knowledgeable system guide for One Father's Love — a resource finder that helps people navigate from health crisis to care.  
Your appearance: You are a beautiful red-headed, green-eyed fox with glasses and a white lab coat bearing the One Father's Love logo. You are warm, caring, and confident.  
Your voice rules:  
- You never say "I understand your concern" or "I'm sorry that happened" or "Unfortunately"  
- You always say things like "Here's exactly what we do right now" or "That door closed. Here's the next one."  
- You are warm but not soft. Direct but not cold. You do not panic. You do not over-explain.  
- You give the next step and stay with the person until they take it.  
- When someone is exhausted, you slow down. One step at a time.  
Your three core responses follow this structure: Feel it → Face it → Do it.  
REASSURANCE (when scared or overwhelmed):  
"You're not alone in this, and what you're feeling is legitimate. Your situation is tough, but it doesn't define your worth — you've done nothing to deserve this struggle. What you're dealing with is real and it's hard. The system is complicated on purpose, but complicated doesn't mean impossible. I know exactly where the doors are. Stay with me and we'll find yours."  
NEXT OPTIONS (when a path closes):  
"Just because one opportunity has slipped through your fingers doesn't mean all hope is lost. Here's what most people don't know — there are always at least two more paths forward, even when they're not immediately visible. That door closed. That happens. It's not the end. Let's take a closer look together and I'll show you the next one. It's smaller than you think and you can do it right now."  
PREPARATION (before a clinic visit or call):  
"Let's get you ready for what's ahead. I'll help you anticipate the questions they might ask and craft confident responses. Know what to ask for, know what they might say, and know exactly what to say back. With a clear plan you'll walk in feeling empowered and in control. You're not going in there alone — you're going in there prepared. And that changes everything."  
THE CRISIS CHAIN — when someone is in urgent health need with no care:  
Step 1: Call the managed care line on the back of your Medi-Cal card. Say: "I need an urgent PCP assignment. My current provider is not accepting new patients."  
Step 2: They are legally required to find you an open clinic. In California, urgent cases must be handled immediately.  
Step 3: Get a reference number before hanging up.  
Step 4: The plan calls the clinic — this clears the registration block most people hit alone.  
Step 5: The appointment is made by the plan, not by you.  
Keep responses concise and warm. You are talking to someone on a phone screen. Never use markdown headers or bullet points — speak in natural flowing sentences. Always end with one clear next action.`;  
      /* ===== NOVI CHAT STATE ===== */  
      const noviPanel = document.getElementById('noviPanel');  
      const noviMessages = document.getElementById('noviMessages');  
      const noviInput = document.getElementById('noviInput');  
      const noviSendBtn = document.getElementById('noviSendBtn');  
      const noviCloseBtn = document.getElementById('noviCloseBtn');  
      let noviHistory = [];  
      let noviOpen = false;  
      function openNovi(clinicContext) {  
        noviOpen = true;  
        noviPanel.classList.add('open');  
        if (noviMessages.children.length === 0) {  
          const greeting = clinicContext ?  
            `You're not alone in this. I see you're looking at ${clinicContext} — let me know where you're at and I'll help you figure out exactly what to do next.` :  
            `You're not alone in this. I'm Novi — your guide through the system. Whatever door you've hit, we'll find the next one together. What's going on right now?`;  
          appendNoviMsg(greeting, 'from-novi');  
          noviHistory.push({  
            role: 'assistant',  
            content: greeting  
          });  
        }  
      }  
      function closeNovi() {  
        noviOpen = false;  
        noviPanel.classList.remove('open');  
      }  
      function appendNoviMsg(text, cls) {  
        const div = document.createElement('div');  
        div.className = `novi-msg ${cls}`;  
        div.textContent = text;  
        noviMessages.appendChild(div);  
        noviMessages.scrollTop = noviMessages.scrollHeight;  
        return div;  
      }  
      async function sendToNovi(userText) {  
        if (!userText.trim()) return;  
        appendNoviMsg(userText, 'from-user');  
        noviHistory.push({  
          role: 'user',  
          content: userText  
        });  
        noviInput.value = '';  
        const typing = appendNoviMsg('Novi is thinking...', 'typing-indicator');  
        try {  
          const res = await fetch('https://api.anthropic.com/v1/messages', {  
            method: 'POST',  
            headers: {  
              'Content-Type': 'application/json'  
            },  
            body: JSON.stringify({  
              model: 'claude-sonnet-4-6',  
              max_tokens: 1000,  
              system: NOVI_SYSTEM,  
              messages: noviHistory  
            })  
          });  
          const data = await res.json();  
          const reply = data.content?.find(b => b.type === 'text')?.text || "I'm here with you. Can you tell me a little more about what's happening?";  
          typing.remove();  
          appendNoviMsg(reply, 'from-novi');  
          noviHistory.push({  
            role: 'assistant',  
            content: reply  
          });  
        } catch (e) {  
          typing.remove();  
          appendNoviMsg("I'm here with you. The connection slipped — but I'm not going anywhere. Try again in a moment.", 'from-novi');  
        }  
      }  
      noviSendBtn.addEventListener('click', () => sendToNovi(noviInput.value));  
      noviInput.addEventListener('keydown', e => {  
        if (e.key === 'Enter') sendToNovi(noviInput.value);  
      });  
      noviCloseBtn.addEventListener('click', closeNovi);  
      document.querySelectorAll('.quick-reply').forEach(btn => {  
        btn.addEventListener('click', () => sendToNovi(btn.dataset.msg));  
      });  
      /* ===== WAVE EFFECT ON BUTTONS ===== */  
      function addWave(btn) {  
        btn.classList.remove('wave');  
        void btn.offsetWidth;  
        btn.classList.add('wave');  
        setTimeout(() => btn.classList.remove('wave'), 400);  
      }  
      /* ===== CARD ENGINE ===== */  
      const stage = document.getElementById("stage");  
      const dotsEl = document.getElementById("dots");  
      const pauseBtn = document.getElementById("pauseBtn");  
      let current = 0,  
        paused = false,  
        timer, animating = false;  
      let cardEls = [],  
        mapMarkers = [],  
        typewriterTimers = [];  
      function buildCards(dataList) {  
        dataList.forEach((c, i) => {  
          const marker = L.marker([c.lat, c.lng]).addTo(map);  
          const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}&travelmode=walking`;  
          marker.bindPopup(`<span class="popup-title">${c.name}</span><span class="popup-address">${c.address}</span><a href="${directionsUrl}" target="_blank" class="dir-btn">Get Directions</a>`);  
          mapMarkers.push(marker);  
          const card = document.createElement("div");  
          card.className = "clinic-card";  
          card.style.display = i === 0 ? "flex" : "none";  
          card.innerHTML = `  
          <div class="card-bg" style="background:${c.gradient};"></div>  
          <div class="card-overlay"></div>  
          <div class="card-body">  
            <div class="clinic-name">${c.name}</div>  
            <div class="dialog-bubble"><span class="dialog-label">Description: </span><span class="info-text" id="desc-${i}"></span></div>  
            <div class="dialog-bubble"><span class="dialog-label">Eligibility: </span><span class="info-text" id="elig-${i}"></span></div>  
            <div class="dialog-bubble"><span class="dialog-label">Specialties: </span><span class="info-text" id="spec-${i}"></span></div>  
            <div class="dialog-bubble"><span class="dialog-label">Payment: </span><span class="info-text" id="pay-${i}"></span></div>  
            <div class="novi-fail-box" id="noviBox-${i}" role="button" aria-label="Talk to Novi">  
              <div class="novi-avatar-frame">🦊</div>  
              <div class="novi-speech">  
                <div class="novi-header">Novi · Tap to ask me anything</div>  
                <p class="novi-text" id="novi-${i}"></p>  
                <div class="novi-tap-hint">Tap to open Novi chat ➔</div>  
              </div>  
            </div>  
            <div class="social-row">  
              <button class="soc-btn fb" aria-label="Share on Facebook">👥</button>  
              <button class="soc-btn x"  aria-label="Share on X">🐦</button>  
              <button class="soc-btn wa" aria-label="Share on WhatsApp">💬</button>  
              <button class="soc-btn copy" aria-label="Copy link">🔗</button>  
              <button class="soc-btn more" aria-label="More options">•••</button>  
            </div>  
          </div>`;  
          stage.appendChild(card);  
          cardEls.push(card);  
          card.querySelector(`#noviBox-${i}`).addEventListener('click', () => openNovi(c.name));  
          card.querySelector('.soc-btn.copy').addEventListener('click', () => navigator.clipboard?.writeText(window.location.href).catch(() => {}));  
          const dot = document.createElement("button");  
          dot.className = "dot" + (i === 0 ? " active" : "");  
          dot.setAttribute("aria-label", `Go to card ${i + 1}`);  
          dot.addEventListener("click", () => {  
            stopTimer();  
            goTo(i);  
            if (!paused) startTimer();  
          });  
          dotsEl.appendChild(dot);  
        });  
        executeTelemetryZoom(0);  
        runTypewriterSequence(0);  
      }  
      function executeTelemetryZoom(idx) {  
        if (mapMarkers[idx]) {  
          map.flyTo(mapMarkers[idx].getLatLng(), 14, {  
            animate: true,  
            duration: 1.2  
          });  
          setTimeout(() => mapMarkers[idx].openPopup(), 1200);  
        }  
      }  
      function clearTypewriters() {  
        typewriterTimers.forEach(t => clearTimeout(t));  
        typewriterTimers = [];  
      }  
      function typeText(elementId, fullText, speed, callback) {  
        const el = document.getElementById(elementId);  
        if (!el) return;  
        el.textContent = "";  
        el.classList.add("typing");  
        let index = 0;  
        function type() {  
          if (index < fullText.length) {  
            el.textContent += fullText.charAt(index++);  
            typewriterTimers.push(setTimeout(type, speed));  
          } else {  
            el.classList.remove("typing");  
            if (callback) callback();  
          }  
        }  
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {  
          el.textContent = fullText;  
          el.classList.remove("typing");  
          if (callback) callback();  
        } else {  
          type();  
        }  
      }  
      function runTypewriterSequence(idx) {  
        clearTypewriters();  
        ["desc", "elig", "spec", "pay", "novi"].forEach(f => {  
          const el = document.getElementById(`${f}-${idx}`);  
          if (el) {  
            el.textContent = "";  
            el.classList.remove("typing");  
          }  
        });  
        const d = FALLBACK_DATA[idx];  
        const speed = 22;  
        typeText(`desc-${idx}`, d.desc, speed, () =>  
          typeText(`elig-${idx}`, d.eligibility, speed, () =>  
            typeText(`spec-${idx}`, d.specialties, speed, () =>  
              typeText(`pay-${idx}`, d.payment, speed, () =>  
                typeText(`novi-${idx}`, d.noviLine, speed)))));  
      }  
      function goTo(next, direction = 1) {  
        if (animating || next === current) return;  
        animating = true;  
        const dots = dotsEl.querySelectorAll(".dot");  
        const outCard = cardEls[current],  
          inCard = cardEls[next];  
        outCard.style.transition = "transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.45s";  
        outCard.style.transformOrigin = "bottom center";  
        requestAnimationFrame(() => {  
          outCard.style.transform = `translateZ(300px) rotateX(${direction > 0 ? 90 : -90}deg)`;  
          outCard.style.opacity = "0";  
        });  
        setTimeout(() => {  
          outCard.style.display = "none";  
          outCard.style.transform = "";  
          outCard.style.opacity = "";  
          outCard.style.transition = "";  
          dots[current].classList.remove("active");  
          current = next;  
          dots[current].classList.add("active");  
          inCard.style.display = "flex";  
          inCard.style.opacity = "0";  
          inCard.style.transform = `translateZ(300px) rotateX(${direction > 0 ? -90 : 90}deg)`;  
          inCard.style.transition = "transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.45s";  
          requestAnimationFrame(() => {  
            inCard.style.transform = "translateZ(0) rotateX(0)";  
            inCard.style.opacity = "1";  
          });  
          executeTelemetryZoom(current);  
          runTypewriterSequence(current);  
          setTimeout(() => {  
            inCard.style.transition = "";  
            animating = false;  
          }, 480);  
        }, 450);  
      }  
      function next() {  
        goTo((current + 1) % cardEls.length, 1);  
      }  
      function prev() {  
        goTo((current - 1 + cardEls.length) % cardEls.length, -1);  
      }  
      /* PROGRESS BAR */  
      const FLIP_DELAY = 25000;  
      let progressBarEl = null,  
        progressInterval = null,  
        progressValue = 0;  
      function startProgress() {  
        clearInterval(progressInterval);  
        progressValue = 0;  
        progressBarEl.style.width = "0%";  
        const step = 100 / (FLIP_DELAY / 100);  
        progressInterval = setInterval(() => {  
          progressValue = Math.min(progressValue + step, 100);  
          progressBarEl.style.width = progressValue + "%";  
        }, 100);  
      }  
      function stopProgress() {  
        clearInterval(progressInterval);  
        progressBarEl.style.width = "0%";  
        progressValue = 0;  
      }  
      function startTimer() {  
        timer = setInterval(next, FLIP_DELAY);  
        startProgress();  
      }  
      function stopTimer() {  
        clearInterval(timer);  
        stopProgress();  
      }  
      document.getElementById("nextBtn").addEventListener("click", () => {  
        addWave(document.getElementById("nextBtn"));  
        stopTimer();  
        next();  
        if (!paused) startTimer();  
      });  
      document.getElementById("prevBtn").addEventListener("click", () => {  
        addWave(document.getElementById("prevBtn"));  
        stopTimer();  
        prev();  
        if (!paused) startTimer();  
      });  
      pauseBtn.addEventListener("click", () => {  
        addWave(pauseBtn);  
        paused = !paused;  
        pauseBtn.innerHTML = paused ? "&#9654; Play" : "&#9646;&#9646; Pause";  
        paused ? stopTimer() : startTimer();  
      });  
      stage.addEventListener('mouseenter', () => {  
        if (!paused) stopTimer();  
      });  
      stage.addEventListener('mouseleave', () => {  
        if (!paused) startTimer();  
      });  
      stage.addEventListener('focusin', () => {  
        if (!paused) stopTimer();  
      });  
      stage.addEventListener('focusout', () => {  
        if (!paused) startTimer();  
      });  
      function init() {  
        buildCards(FALLBACK_DATA);  
        progressBarEl = document.getElementById("progressBar");  
        startTimer();  
        document.getElementById("fetchStatus").textContent = "Section 508 compliance interface initialized";  
      }  
      init();  
    </script>  
  </body>  
</html>
