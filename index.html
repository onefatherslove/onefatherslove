<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Father's Love — Sacramento Resource Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --crimson: #800000;
  --crimson-light: rgba(128,0,0,0.1);
  --gold: #c9a84c;
  --black: #060606;
  --white: #fff;
  --gray: #999;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
}

/* HERO */
#hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a0000;
}
#hero iframe {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  min-width: 100%;
  min-height: 100%;
  border: 0;
}
#hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.4), rgba(0,0,0,.8));
}
#hero-title {
  position: relative;
  text-align: center;
}
#hero-title h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 8vw, 6rem);
}

/* DIRECTORY */
#directory-section {
  padding: 60px 20px;
  max-width: 720px;
  margin: auto;
}

.nav-item {
  height: 62px;
  overflow: hidden;
  transition: all .4s ease;
  opacity: .3;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.nav-item.active {
  height: 110px;
  opacity: 1;
  background: var(--crimson-light);
}
.nav-item-inner { padding: 16px 20px; }

.nav-item h3 {
  display: flex;
  gap: 10px;
  font-family: 'Cormorant Garamond', serif;
}

.nav-item p {
  font-size: 12px;
  color: var(--gray);
  padding-left: 30px;
}

.nav-item a {
  color: inherit;
  text-decoration: none;
}

/* HUD */
#survival-hud {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  background: #111;
  padding: 10px 20px;
  border-radius: 12px;
  z-index: 9999;
}

.hud-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}

.hud-icon { font-size: 20px; }
.hud-label { font-size: 10px; color: var(--gold); }

.status-clear { color: #00ff88; }
.status-hot { color: red; }
</style>
</head>

<body>

<section id="hero">
  <iframe src="https://www.youtube.com/embed/VYSIYQ5v4YY?autoplay=1&muted=1&loop=1&playlist=VYSIYQ5v4YY"></iframe>
  <div id="hero-overlay"></div>
  <div id="hero-title">
    <h1>One Father's Love</h1>
  </div>
</section>

<section id="directory-section">

<div class="nav-item"><div class="nav-item-inner">
<a href="#"><h3>01 Housing</h3><p>Affordable housing resources.</p></a>
</div></div>

<div class="nav-item"><div class="nav-item-inner">
<a href="#"><h3>02 Shelters</h3><p>Emergency shelters.</p></a>
</div></div>

<div class="nav-item"><div class="nav-item-inner">
<a href="#"><h3>03 Utilities</h3><p>Utility assistance.</p></a>
</div></div>

<div class="nav-item"><div class="nav-item-inner">
<a href="#"><h3>04 FREE Clinics</h3><p>Medical services.</p></a>
</div></div>

<div class="nav-item"><div class="nav-item-inner">
<a href="#"><h3>05 Dental</h3><p>Dental services.</p></a>
</div></div>

</section>

<!-- HUD -->
<div id="survival-hud">
  <div class="hud-item" onclick="toggleStatus()">
    <span id="status-dot" class="hud-icon status-clear">●</span>
    <span class="hud-label">Status</span>
  </div>
</div>

<script>
/* NAVIGATION */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    entry.target.classList.toggle('active', entry.isIntersecting);
  });
}, { threshold: 0.4 });

document.querySelectorAll('.nav-item').forEach(el => observer.observe(el));

/* HUD */
let currentStatus = 'clear';

function toggleStatus() {
  const dot = document.getElementById('status-dot');
  if (currentStatus === 'clear') {
    currentStatus = 'hot';
    dot.className = 'hud-icon status-hot';
  } else {
    currentStatus = 'clear';
    dot.className = 'hud-icon status-clear';
  }
}

/* SCROLL PROGRESS EFFECT */
window.addEventListener('scroll', () => {
  const progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  const dot = document.getElementById('status-dot');

  if (progress > 0.7) {
    dot.className = 'hud-icon status-hot';
  } else {
    dot.className = 'hud-icon status-clear';
  }
});
</script>

</body>
</html>
