<html lang="en">
<head>

<title>One Father's Love — Sacramento Resource Directory</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --crimson: #800000;
    --crimson-mid: rgba(128,0,0,0.25);
    --crimson-light: rgba(128,0,0,0.1);
    --gold: #c9a84c;
    --black: #060606;
    --white: #fff;
    --gray: #999;
    --light-gray: #ccc;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  #hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0000;
  }

  #hero iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 177.78vh;
    height: 56.25vw;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    border: 0;
    pointer-events: none;
  }

  #hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.4) 0%,
      rgba(0,0,0,0.15) 40%,
      rgba(0,0,0,0.75) 100%);
    z-index: 1;
  }

  #hero-title {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 20px;
  }

  #hero-title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 9vw, 7rem);
    font-weight: 300;
    color: var(--white);
    text-shadow: 0 2px 40px rgba(0,0,0,0.9);
    line-height: 1.05;
    letter-spacing: 0.05em;
  }

  #hero-title .tagline {
    margin-top: 14px;
    font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
  }

  #hero-title .mission {
    margin-top: 20px;
    color: rgba(255,255,255,0.75);
    max-width: 540px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
  }

  .scroll-hint {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.55;
    animation: bounce 2.2s infinite;
  }

  .scroll-hint span {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(9px); }
  }

  #about-strip {
    background: var(--crimson);
    padding: 28px 30px;
    text-align: center;
  }

  #about-strip p {
    font-size: 0.82rem;
    line-height: 1.8;
    color: rgba(255,255,255,0.88);
    max-width: 800px;
    margin: 0 auto;
    letter-spacing: 0.03em;
  }

  #about-strip strong { color: var(--white); font-weight: 500; }

  #directory-section {
    padding: 70px 20px 40px;
    max-width: 720px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.62rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    text-align: center;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 300;
    text-align: center;
    margin-bottom: 50px;
    color: var(--white);
  }
